<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PRAGUE ZOOMBIES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
  }
  body {
    background: radial-gradient(ellipse at center, #0a1a00 0%, #050a00 60%, #000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    min-height: 0;
    max-height: 100dvh;
    width: 100vw;
    box-sizing: border-box;
    padding: 0;
    gap: 0;
    font-family: 'Share Tech Mono', monospace;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }

  #topbar {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 2px 8px;
    width: 100%;
    flex-shrink: 0;
    box-sizing: border-box;
  }
  #header {
    color: #22aa00;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(13px, 2.5vw, 22px);
    letter-spacing: clamp(2px, 1vw, 7px);
    text-shadow: 0 0 12px #44ff00, 0 0 28px #007700, 2px 2px 0 #000;
    white-space: nowrap;
  }
  #score {
    color: #aaffaa;
    font-size: clamp(14px, 2.5vw, 20px);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 5px;
    text-shadow: 0 0 10px #66ff44, 0 0 22px #33cc22, 0 2px 4px #000;
    white-space: nowrap;
  }

  #game-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  canvas#game {
    border: 2px solid #226600;
    box-shadow: 0 0 20px #33aa00, 0 0 60px #0a2200;
    display: block;
    flex-shrink: 1;
    max-height: calc(100dvh - 70px);
    max-width: 100%;
    height: auto;
  }
  @media (max-width: 599px) {
    canvas#game { border: none; box-shadow: none; }
  }
  /* iPad / tablet */
  @media (min-width: 600px) and (max-width: 1400px) and (pointer: coarse) {
    canvas#game { max-height: calc(100dvh - 50px); }
  }

  #bg {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events: none;
    z-index: -1;
  }

  .side-spacer { display: none; }

  #game-wrap {
    position: relative;
    display: inline-block;
    line-height: 0;
  }

  /* Controls hidden by default on non-touch devices */
  #joy-overlay, #fire-overlay {
    position: absolute;
    z-index: 10;
    touch-action: none;
    display: none;
  }

  /* Show only on touch devices (phones + tablets) */
  @media (pointer: coarse) {
    #joy-overlay {
      display: block;
      bottom: 4%;
      left: 14px;
    }
    #fire-overlay {
      display: block;
      bottom: 4%;
      right: 14px;
    }
  }

  #joystick-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #joystick-base {
    width: clamp(80px, 18vw, 110px);
    height: clamp(80px, 18vw, 110px);
    border-radius: 50%;
    background: rgba(20,60,10,0.55);
    border: 2px solid #226600;
    box-shadow: 0 0 12px #226600aa;
    position: relative;
    touch-action: none;
    cursor: pointer;
  }
  #joystick-knob {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #66cc33, #224400);
    border: 2px solid #44aa22;
    box-shadow: 0 0 8px #44ff0066;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    transition: box-shadow 0.1s;
  }

  .btn {
    background: #051a00;
    border: 2px solid #226600;
    color: #44aa00;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 12px 18px;
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    box-shadow: 0 0 8px #11440044;
    touch-action: manipulation;
  }
  .btn:active { background: #083300; }

  #fire-btn {
    border-color: #007700;
    color: #00ee22;
    box-shadow: 0 0 14px #00ee2244;
    background: rgba(0,20,0,0.65);
    font-size: 12px;
    padding: 0;
    gap: 0;
    border-radius: 50%;
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    line-height: 1.3;
  }

  /* ── MOBILE FULLSCREEN ─────────────────────────────── */
  @media (pointer: coarse) {
    html {
      height: 100svh !important;
      overflow: hidden !important;
    }
    body {
      width: 100vw !important;
      height: 100svh !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      background: #1a1612 !important;
      display: flex !important;
      flex-direction: column !important;
      justify-content: flex-start !important;
      align-items: stretch !important;
      gap: 0 !important;
      box-sizing: border-box !important;
    }
    #bg { display: none !important; }
    #topbar {
      width: 100% !important;
      flex-shrink: 0 !important;
      padding: 2px 8px !important;
      margin: 0 !important;
      box-sizing: border-box !important;
      line-height: 1 !important;
    }
    #topbar #header {
      font-size: clamp(10px, 3vw, 16px) !important;
      letter-spacing: 3px !important;
    }
    #topbar #score {
      font-size: clamp(12px, 3.5vw, 18px) !important;
      letter-spacing: 3px !important;
    }
    #game-row {
      flex: 1 1 0 !important;
      min-height: 0 !important;
      width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      display: flex !important;
      align-items: stretch !important;
    }
    #game-wrap {
      flex: 1 1 0 !important;
      width: 100% !important;
      min-height: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
    }
    canvas#game {
      flex: 1 1 0 !important;
      width: 100% !important;
      height: 100% !important;
      min-height: 0 !important;
      max-height: none !important;
      max-width: none !important;
      display: block !important;
      margin: 0 !important;
      border: none !important;
      box-shadow: none !important;
    }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="topbar"><span id="header">☣ PRAGUE ZOOMBIES ☣</span><span id="score">0 m</span></div>
<div id="game-row">
  <div id="game-wrap">
    <canvas id="game"></canvas>
    <!-- Controls always inside game-wrap, positioned bottom corners -->
    <div id="joy-overlay">
      <div id="joystick-base"><div id="joystick-knob"></div></div>
    </div>
    <div id="fire-overlay">
      <button class="btn" id="fire-btn">💥<br>FIRE</button>
    </div>
  </div>
</div>

// Ash particles over the real image
const ashParticles = Array.from({length:70}, () => ({
  x: Math.random()*BW, y: Math.random()*BH,
  vx:(Math.random()-.5)*0.3, vy:Math.random()*0.2+0.05,
  r:Math.random()*1.6+0.4, phase:Math.random()*Math.PI*2
}));

function rngBg(s){ return ((Math.sin(s)*43758.5453)%1+1)%1; }

function drawPragueBackground() {
  sctx.clearRect(0, 0, BW, BH);

  // Draw the real photo as background, cover entire canvas
  if (bgImg.complete && bgImg.naturalWidth > 0) {
    // Scale to cover, centred
    const scale = Math.max(BW / bgImg.naturalWidth, BH / bgImg.naturalHeight);
    const dw = bgImg.naturalWidth * scale;
    const dh = bgImg.naturalHeight * scale;
    const dx = (BW - dw) / 2;
    const dy = (BH - dh) / 2;
    sctx.drawImage(bgImg, dx, dy, dw, dh);
  } else {
    // Fallback solid color while loading
    sctx.fillStyle = '#2a1a0a';
    sctx.fillRect(0, 0, BW, BH);
  }

  // Subtle dark vignette to frame the game canvas
  const vig = sctx.createRadialGradient(BW/2, BH/2, BH*0.25, BW/2, BH/2, BH*0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  sctx.fillStyle = vig;
  sctx.fillRect(0, 0, BW, BH);

  // Animated ash/embers drifting
  ashParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.phase += 0.007;
    if (p.y > BH) { p.y = -5; p.x = Math.random()*BW; }
    const a = 0.18 + 0.12*Math.abs(Math.sin(p.phase));
    sctx.fillStyle = `rgba(210,170,110,${a})`;
    sctx.beginPath(); sctx.arc(p.x, p.y, p.r, 0, Math.PI*2); sctx.fill();
  });

  requestAnimationFrame(drawPragueBackground);
}
drawPragueBackground();

// rng helpers
function rng(seed){ return ((Math.sin(seed)*43758.5453)%1+1)%1; }
function rng2(a,b){ return rng(a*137.3+b*31.7); }

// ============================================================
// SCENE OBJECTS — Prague streets top-down
// ============================================================
const OBJ_REPEAT = 1400;

const OBJ_RADIUS = {
  car:      s => 22*s+6,
  rubble:   s => 14*s+5,
  dumpster: s => 14*s+5,
  barricade:s => 16*s+5,
  wreck:    s => 48*s+6,
  rock:     s => 12*s+4,
  big_rock: s => 22*s+6,
  sprout:   s => 6*s+2,
  fire:     s => 16*s+4,
  crack_a:  s => 12*s+4,
  crack_b:  s => 14*s+4,
  lamppost: s => 6*s+4,
  crack:    s => 10*s,
  bush:     s => 16*s+4,
  weed:     s => 8*s+3,
  vine:     s => 12*s+4,
};

function overlapsAny(wx,wy,r){
  for(const o of SCENE_OBJS){
    const or2=o._r||20;
    const dwx=(wx-o.wx+OBJ_REPEAT/2)%OBJ_REPEAT-OBJ_REPEAT/2;
    const dwy=(wy-o.wy+OBJ_REPEAT/2)%OBJ_REPEAT-OBJ_REPEAT/2;
    if(Math.sqrt(dwx*dwx+dwy*dwy)<r+or2) return true;
  }
  return false;
}

const SCENE_OBJS = [];
const OBJ_DEFS = [
  ['barricade',  8, 0.8, 1.2],
  ['crack_a',    8, 0.9, 1.5],
  ['crack_b',    7, 0.9, 1.4],
  ['wreck',      1, 1.2, 1.4],
  ['rock',       4, 0.8, 1.6],
  ['big_rock',   2, 1.4, 1.8],
  ['sprout',    26, 0.8, 1.3],
  ['fire',       1, 1.2, 1.6],
];
let _oi=0;
OBJ_DEFS.forEach(([type,count,minS,maxS])=>{
  for(let i=0;i<count;i++,_oi++){
    const scale=minS+rng2(_oi,3)*(maxS-minS);
    const r=(OBJ_RADIUS[type]||((s)=>12*s))(scale);
    let wx,wy,attempts=0;
    do{
      wx=rng2(_oi+attempts*97,1)*OBJ_REPEAT;
      wy=rng2(_oi+attempts*97,2)*OBJ_REPEAT;
      attempts++;

class ZombiePixel {
  constructor(opts = {}) {
    this.x       = opts.x       ?? 100;
    this.y       = opts.y       ?? 100;
    this.px      = opts.px      ?? 5;
    this.speed   = opts.speed   ?? 1.5;
    this.flipped = opts.flipped ?? false;
    this.maxHP   = 100;
    this.hp      = 100;
    this.state   = 'idle';
    this._dead   = false;
    this.alive   = true;
    this._ticker  = 0;
    this._frame   = 0;
    this._walkPhase = 0;
    this._tx = null; this._ty = null;
    this._hitFlash = 0;
    this._dieRot = 0; this._dieY = 0;
    this._bobT   = 0;
    this.onDeath = opts.onDeath ?? null;
  }
  get spriteW() { return 24; }
  get spriteH() { return ZOMBIE_IDLE.length; }
  get width()   { return this.spriteW * this.px; }
  get height()  { return this.spriteH * this.px; }

  setState(s) {
    if (this._dead && s !== 'dead') return;
    if (this.state === s) return;
    this.state = s; this._ticker = 0; this._frame = 0;
  }
  flip(val) { this.flipped = val; }
  moveTo(x, y) { this._tx = x; this._ty = y; this.setState('walk'); }
  takeDamage(d) {
    if (this._dead) return;
    this.hp = Math.max(0, this.hp - d);
    this._hitFlash = 10;
    if (this.hp <= 0) this.setState('die');
  }

  update() {
    if (this._dead) return;
    if (this.state === 'walk' && this._tx !== null) {
      const dx = this._tx - this.x, dy = this._ty - this.y;
      const dist = Math.hypot(dx, dy);
      if (dist < this.speed) {
        this.x = this._tx; this.y = this._ty; this._tx = null; this.setState('idle');
      } else {
        this.x += dx/dist*this.speed; this.y += dy/dist*this.speed; this.flipped = dx < 0;
      }
    }
    if (this.state === 'die') {
      // Fall forward from feet pivot — same as player death
      this._dieRot = Math.min(Math.PI / 2, this._dieRot + 0.04);
      if (this._dieRot >= Math.PI / 2 - 0.01) {
        this._dead = true; this.alive = false; this.state = 'dead';
        if (this.onDeath) this.onDeath(this);
        return;
      }
    }
    if (this._hitFlash > 0) this._hitFlash--;
    this._bobT += 0.05;
    this._ticker++;
    const rate = this.state === 'walk' ? 12 : 18;
    if (this._ticker >= rate) { this._ticker = 0; this._frame++; if (this.state === 'walk') this._walkPhase ^= 1; }
  }

  draw(ctx) {
    // Skip if fully dead and not lying (already cleaned up)
    if (this._dead && this.state === 'dead' && !this._lying) return;
    const px = this.px;
    const sprite = (this.state === 'walk' && this._walkPhase) ? ZOMBIE_WALK : ZOMBIE_IDLE;
    const sh = sprite.length, sw = this.spriteW;
    const bob = this.state === 'idle' ? Math.round(Math.sin(this._bobT) * 0.8) : 0;

    // Shadow
    ctx.save(); ctx.scale(1, 0.25);
    ctx.beginPath();
    ctx.ellipse(this.x + sw*px/2, (this.y + sh*px + bob)/0.25, sw*px*0.4, sw*px*0.14, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fill(); ctx.restore();

    const pivotX = this.x + sw*px/2, pivotY = this.y + sh*px + bob;
    ctx.save();
    ctx.translate(pivotX, pivotY);
    if (this.flipped) ctx.scale(-1, 1);
    // Die: handled below via pivot transform — skip here
    ctx.translate(-sw*px/2, -sh*px);

    // Death fall: rotate from feet pivot (bottom centre of sprite)
    if (this.state === 'die' || this.state === 'dead') {
      const feetX = sw*px/2;
      const feetY = sh*px;
      ctx.translate(feetX, feetY);
      ctx.rotate(Math.min(Math.PI/2, this._dieRot));
      ctx.translate(-feetX, -feetY);
    }

    if (this._hitFlash % 2 === 1) { ctx.filter = 'brightness(3) saturate(0)'; ctx.globalAlpha = 0.75; }
    // Fade out when lying dead
    if (this.state === 'dead') { ctx.globalAlpha = 0.55; }

    for (let row = 0; row < sprite.length; row++) {
      const r = sprite[row];
      for (let col = 0; col < r.length; col++) {
        const c = r[col]; if (!c) continue;
        ctx.fillStyle = c;
        ctx.fillRect(col*px, row*px, px, px);
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    if (!this._dead && this.hp < this.maxHP) {
      const bx = this.x, by = this.y + bob - 8, bw = sw*px, bh = 5;
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(bx, by, bw, bh);
      const pct = this.hp/this.maxHP;
      ctx.fillStyle = pct > 0.6 ? '#44cc44' : pct > 0.3 ? '#ccaa00' : '#cc2222';
      ctx.fillRect(bx, by, bw*pct, bh);
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, bh);
    }
  }
}

// ── Joystick ──────────────────────────────────────────
const joystickBase = document.getElementById('joystick-base');
const joystickKnob = document.getElementById('joystick-knob');
const JOY_R = 38; // max knob travel radius

const leftState={val:false}, rightState={val:false};
const upState={val:false},   downState={val:false};
let joyActive = false, joyOriginX = 0, joyOriginY = 0;
let joyDX = 0, joyDY = 0;

function joyStart(cx, cy) {
  joyActive = true;
  const rect = joystickBase.getBoundingClientRect();
  joyOriginX = rect.left + rect.width/2;
  joyOriginY = rect.top  + rect.height/2;
  joyMove(cx, cy);
}
function joyMove(cx, cy) {
  if (!joyActive) return;
  let dx = cx - joyOriginX, dy = cy - joyOriginY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > JOY_R) { dx = dx/dist*JOY_R; dy = dy/dist*JOY_R; }
  joyDX = dx; joyDY = dy;
  joystickKnob.style.transform =
    `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  const threshold = JOY_R * 0.28;
  leftState.val  = dx < -threshold;
  rightState.val = dx >  threshold;
  upState.val    = dy < -threshold;
  downState.val  = dy >  threshold;
}
function joyEnd() {
  joyActive = false; joyDX = 0; joyDY = 0;
  joystickKnob.style.transform = 'translate(-50%, -50%)';
  leftState.val = rightState.val = upState.val = downState.val = false;
}

function shoot(){

    // Determine direction from current input
    const left  = keys['ArrowLeft'] ||keys['a']||leftState.val;

// SOLID COLLISION
// ============================================================
function resolveSolid(rsx,rsy,r){
  const pcx=player.x+player.w/2, pcy=player.y+player.h/2;
  const dx=pcx-rsx, dy=pcy-rsy;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const minD=player.w*0.38+r;
  if(dist<minD){
    const push=(minD-dist)/dist;
    player.x+=dx*push; player.y+=dy*push;
  }
}

// ============================================================
// UPDATE
// ============================================================
const MAP_BOTTOM = H-PLAYER_H-40;

function update(){
  animTick++;
  const spd=player.speed;

  if (introActive || gameOverActive) return; // completely frozen on game over

  // When player is dead — only animate zombie death, no movement/scroll
  if (playerDead) {
    playerDieRot = Math.min(Math.PI/2, playerDieRot + 0.04);
    playerDieTimer++;
    zombie.update(); // keep zombie death animation going
    return;
  }
  if(keys['ArrowLeft']||keys['a']||leftState.val)  player.x-=spd;
  if(keys['ArrowRight']||keys['d']||rightState.val) player.x+=spd;
  if(keys['ArrowUp']||keys['w']||upState.val)       player.y-=spd;
  if(keys['ArrowDown']||keys['s']||downState.val)   player.y+=spd;
  if(keys[' ']) shoot();

  player.x=Math.max(0,Math.min(W-player.w,player.x));
  player.y=Math.min(MAP_BOTTOM,player.y);

  // Map scroll — scrolls whenever player moves up (endless runner style)
  if (keys['ArrowUp'] || keys['w'] || upState.val) {
    camY -= player.speed;
    player.y = Math.min(MAP_BOTTOM, player.y);
  } else if (player.y < SCROLL_TRIGGER_Y) {
    const ov = SCROLL_TRIGGER_Y - player.y;
    camY -= ov; player.y = SCROLL_TRIGGER_Y;
  }

  player.wx=player.x+player.w/2;
  player.wy=camY+player.y+player.h/2;

  // Solid collisions — player
  SOLID_OBJS.forEach(o=>{
    const sx=(o.wx%W+W)%W;
    const sy=((o.wy-camY)%OBJ_REPEAT+OBJ_REPEAT)%OBJ_REPEAT-100;
    if(sy>-50&&sy<H+50) resolveSolid(sx,sy,o._r);
  });
  player.x=Math.max(0,Math.min(W-player.w,player.x));
  player.y=Math.min(MAP_BOTTOM,player.y);

  // Solid collisions — zombie
  if (!zombie._dead && zombie.state !== 'die') {
    SOLID_OBJS.forEach(o=>{
      const sx=(o.wx%W+W)%W;
      const sy=((o.wy-camY)%OBJ_REPEAT+OBJ_REPEAT)%OBJ_REPEAT-100;
      if(sy<-80||sy>H+80) return;
      const zcx=zombie.x+zombie.width/2, zcy=zombie.y+zombie.height/2;
      const dx=zcx-sx, dy=zcy-sy;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      const minD=zombie.width*0.4+o._r*0.85;
      if(dist<minD){
        const push=(minD-dist)/dist;
        zombie.x+=dx*push; zombie.y+=dy*push;
      }
    });
  }

  // Bullets
  if(player.shootCooldown>0) player.shootCooldown--;
  player.bullets.forEach(b=>{b.sx+=b.vx;b.sy+=b.vy;});
  // Block player bullets by solid objects
  player.bullets = player.bullets.filter(b => {
    if (b.sy < -50 || b.sy > H+50) return false;
    for (const o of SOLID_OBJS) {
      const osx = (o.wx % W + W) % W;
      const osy = ((o.wy - camY) % OBJ_REPEAT + OBJ_REPEAT) % OBJ_REPEAT - 100;
      if (osy < -80 || osy > H+80) continue;
      const dx = b.sx - osx, dy = b.sy - osy;
      if (Math.sqrt(dx*dx+dy*dy) < o._r * 0.85) return false; // bullet blocked
    }
    return true;
  });

  // ── ZombiePixel ──
  // Apply speed boost FIRST (every 4 kills = +30%), then update
  zombie.speed = killCount >= 3 ? 1.5 : 0.9;

  // Scroll zombie with the map always — keeps it fixed in world space
  if (keys['ArrowUp'] || keys['w'] || upState.val) {
    zombie.y += player.speed;
  }

  if (!zombie._dead && zombie.state !== 'die') {
    const pCx = player.x + player.w/2 - zombie.width/2;
    const pCy = player.y + player.h/2 - zombie.height/2;

    if (killCount >= 3) {
      // SMART: move directly each frame with sinusoidal X strafing
      const dx = pCx - zombie.x;
      const dy = pCy - zombie.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      // Strafe: add sideways oscillation perpendicular to movement direction
      const strafeAmp = 3.5;
      const strafeX = Math.cos(animTick * 0.06 + zombie._strafePhase) * strafeAmp;
      zombie.x += (dx / dist) * zombie.speed + strafeX;
      zombie.y += (dy / dist) * zombie.speed;
      zombie.flipped = dx < 0;
      zombie.state = 'walk';
      // Advance walk animation manually
      zombie._ticker++;
      if (zombie._ticker >= 12) { zombie._ticker = 0; zombie._walkPhase ^= 1; }
    } else {
      // DUMB: straight toward player via moveTo
      zombie.moveTo(pCx, pCy);
    }
  }
  zombie.update();
  // Zombie shoots — only from kill 8+
  if (killCount >= 6 && !zombie._dead && zombie.state !== 'die') {
    zombieShootTimer++;
    const shootInterval = Math.max(18, 50 - killCount * 2);
    if (zombieShootTimer >= shootInterval) {
      zombieShootTimer = 0;
      // Fire from zombie centre toward player
      const zCx = zombie.x + zombie.width/2;
      const zCy = zombie.y + zombie.height/2 - zombie.height*0.3; // from head area
      const pCx = player.x + player.w/2;
      const pCy = player.y + player.h/2;
      const dx = pCx - zCx, dy = pCy - zCy;
      const dist = Math.sqrt(dx*dx+dy*dy)||1;
      const spd = 5;
      enemyBullets.push({ sx: zCx, sy: zCy, vx: dx/dist*spd, vy: dy/dist*spd });
    }
  }

  // Enemy bullet movement + player hit
  enemyBullets.forEach(b => { b.sx += b.vx; b.sy += b.vy; });
  enemyBullets = enemyBullets.filter(b => {
    if (b.sx<-20||b.sx>W+20||b.sy<-20||b.sy>H+20) return false;
    for (const o of SOLID_OBJS) {
      const osx = (o.wx % W + W) % W;
      const osy = ((o.wy - camY) % OBJ_REPEAT + OBJ_REPEAT) % OBJ_REPEAT - 100;
      if (osy < -80 || osy > H+80) continue;
      const dx = b.sx - osx, dy = b.sy - osy;
      if (Math.sqrt(dx*dx+dy*dy) < o._r * 0.85) return false; // enemy bullet blocked
    }
    return true;
  });
  enemyBullets.forEach(b => {
    const pCx = player.x+player.w/2, pCy = player.y+player.h/2;
    if (!playerDead && Math.sqrt((b.sx-pCx)**2+(b.sy-pCy)**2) < 28) {
      b.sx = -999;
      if (!playerDead) {
        playerHits++;
        if (playerHits >= 2) {
          playerDead = true; playerDieRot = 0; playerDieTimer = 0;
          distAtDeath = Math.max(0, Math.round(-camY/10));
          setTimeout(() => { gameOverActive = true; }, 1200);
        } else {
          // Flash player red on first hit
          player._hitFlash = 20;
        }
      }
    }
  });

  if (!zombie._dead) {

    // Bullet hits zombie
    player.bullets.forEach(b => {
      if (zombie._dead) return;
      if (b.sx >= zombie.x && b.sx <= zombie.x + zombie.width &&
          b.sy >= zombie.y && b.sy <= zombie.y + zombie.height) {
        zombie.takeDamage(50);
        b.sy = -9999;
        if (zombie._dead) { score += 200; } // killCount incremented in onDeath
      }
    });

    // Contact with player — player dies, falls down
    const zdx = (zombie.x + zombie.width/2) - (player.x + player.w/2);
    const zdy = (zombie.y + zombie.height/2) - (player.y + player.h/2);
    if (Math.sqrt(zdx*zdx + zdy*zdy) < 45 && !playerDead) {
      playerHits = 2;
      playerDead = true;
      playerDieRot = 0;
      playerDieTimer = 0;
      distAtDeath = Math.max(0, Math.round(-camY/10));
      // Show Game Over after fall animation completes
      setTimeout(() => { gameOverActive = true; }, 1200);
    }
  }

  // (player die animation handled in early return above)

  // Particles & explosions
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.life-=p.decay; });
  particles = particles.filter(p => p.life > 0);
  explosions.forEach(e => { e.r+=2; e.life-=0.08; });
  explosions = explosions.filter(e => e.life > 0);

  // Score = distance
  const dist=Math.max(0,Math.round(-camY/10));
  document.getElementById('score').textContent = dist + ' m';
}

// ============================================================
// DRAW SCENE OBJECT
// ============================================================
function drawSceneObj(o, sx, sy){
  const s=o.scale;
  ctx.save(); ctx.translate(sx,sy);

  if(o.type==='car'){
    // Abandoned burnt car top-down
    const cw=28*s, ch=18*s;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(3,4,cw*1.1,ch*0.75,o.wobble*0.1,0,Math.PI*2); ctx.fill();
    // Body
    const carColors=[['#2a1a0a','#3a2518'],['#1a1a1a','#2a2a2a'],['#1a0a0a','#2d1212']];
    const cc=carColors[o.variant];
    ctx.fillStyle=cc[0];
    ctx.beginPath(); ctx.roundRect(-cw,-ch,cw*2,ch*2,4); ctx.fill();
    // Windows (broken, dark)
    ctx.fillStyle='rgba(30,20,10,0.8)';
    ctx.beginPath(); ctx.roundRect(-cw*0.5,-ch*0.6,cw,ch*1.2,2); ctx.fill();
    // Rust/fire damage
    ctx.fillStyle='rgba(140,40,0,0.45)';
    ctx.beginPath(); ctx.ellipse(-cw*0.3,ch*0.1,cw*0.4,ch*0.35,0.8,0,Math.PI*2); ctx.fill();
    // Wheels
    ctx.fillStyle='#111';
    [[-cw,-ch],[-cw,ch],[cw,-ch],[cw,ch]].forEach(([wx2,wy2])=>{
      ctx.beginPath(); ctx.arc(wx2,wy2,5*s,0,Math.PI*2); ctx.fill();
    });

  }else if(o.type==='rubble'){
    // Pile of concrete rubble
    const rw=16*s, rh=12*s;
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(3,4,rw*1.1,rh*0.7,0,0,Math.PI*2); ctx.fill();
    const colors=['#4a4038','#3e3830','#524840'];
    for(let r=0;r<5;r++){
      const rx=(rng2(o.wx+r,1)-.5)*rw*1.5;
      const ry=(rng2(o.wx+r,2)-.5)*rh*1.2;
      const rr=rw*(0.2+rng2(o.wx+r,3)*0.3);
      ctx.fillStyle=colors[r%3];
      ctx.beginPath();
      ctx.moveTo(rx,ry-rr);
      ctx.lineTo(rx+rr*0.8,ry+rr*0.6);
      ctx.lineTo(rx-rr*0.7,ry+rr*0.5);
      ctx.closePath(); ctx.fill();
    }
    // Rebar sticking out
    ctx.strokeStyle='#333'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-rw*0.5,-rh*0.8); ctx.lineTo(-rw*0.2,rh*0.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rw*0.3,-rh*0.5); ctx.lineTo(rw*0.5,rh*0.8); ctx.stroke();

  }else if(o.type==='dumpster'){
    const dw=14*s, dh=10*s;
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(3,4,dw*1.1,dh*0.7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=['#1a3a1a','#2a1a0a','#1a1a2a'][o.variant];
    ctx.beginPath(); ctx.roundRect(-dw,-dh,dw*2,dh*2,3); ctx.fill();
    ctx.strokeStyle='rgba(100,80,40,0.5)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-dw,0); ctx.lineTo(dw,0); ctx.stroke();
    // Trash spilling
    ctx.fillStyle='rgba(40,30,10,0.7)';
    ctx.beginPath(); ctx.ellipse(dw*0.8,dh*0.5,dw*0.4,dh*0.3,0.5,0,Math.PI*2); ctx.fill();

  }else if(o.type==='barricade'){
    // Police/military barricade
    const bw=20*s, bh=6*s;
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-bw,bh,bw*2,bh*0.5);
    // Main beam
    ctx.fillStyle='#cc4400';
    ctx.fillRect(-bw,-bh,bw*2,bh*2);
    // Yellow warning stripes
    ctx.fillStyle='#ffaa00';
    for(let st=-bw;st<bw;st+=12*s){
      ctx.beginPath();
      ctx.moveTo(st,-bh); ctx.lineTo(st+6*s,-bh); ctx.lineTo(st+4*s,bh); ctx.lineTo(st-2*s,bh);
      ctx.closePath(); ctx.fill();
    }
    // Supports
    ctx.fillStyle='#aa2200';
    ctx.fillRect(-bw,-bh*2,5*s,bh*4);
    ctx.fillRect(bw-5*s,-bh*2,5*s,bh*4);

  }else if(o.type==='crack_a'){
    // TYPE A: Deep pothole with broken asphalt rim and standing water
    const pr = 13*s, pr2 = pr*0.65;
    // Shadow under hole
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.ellipse(3,3,pr+2*s,pr2+1*s,0,0,Math.PI*2); ctx.fill();
    // Broken asphalt chunks around rim
    for(let r=0;r<7;r++){
      const ra=(r/7)*Math.PI*2, jit=rng2(o.wx+r,80)*0.8;
      ctx.fillStyle=r%2?'#2e2a22':'#38322a';
      ctx.beginPath();
      ctx.ellipse(Math.cos(ra+jit)*(pr*0.9),Math.sin(ra+jit)*(pr2*0.9),
        3*s+rng2(o.wx+r,81)*4*s, 2*s+rng2(o.wx+r,82)*3*s, ra, 0, Math.PI*2);
      ctx.fill();
    }
    // Dark hole
    ctx.fillStyle='rgba(0,0,0,0.8)';
    ctx.beginPath(); ctx.ellipse(0,0,pr*0.85,pr2*0.78,o.wobble*0.2,0,Math.PI*2); ctx.fill();
    // Muddy water
    ctx.fillStyle='rgba(45,38,22,0.75)';
    ctx.beginPath(); ctx.ellipse(-1*s,2*s,pr*0.45,pr2*0.38,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(90,78,50,0.18)';
    ctx.beginPath(); ctx.ellipse(-3*s,1*s,pr*0.18,pr2*0.12,0.4,0,Math.PI*2); ctx.fill();
    // Radiating cracks
    ctx.strokeStyle='rgba(25,20,14,0.55)'; ctx.lineWidth=1.5; ctx.lineCap='round';
    for(let c=0;c<5;c++){
      const ca=(c/5)*Math.PI*2+o.wobble;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ca)*pr*0.8, Math.sin(ca)*pr2*0.8);
      ctx.lineTo(Math.cos(ca)*(pr+7*s+rng2(o.wx+c,83)*6*s),
                 Math.sin(ca)*(pr2+4*s+rng2(o.wx+c,84)*4*s));
      ctx.stroke();
    }

  }else if(o.type==='crack_b'){
    // TYPE B: Surface cracks only — no hole, just fractured asphalt pattern
    const cl = 16*s;
    ctx.lineCap='round'; ctx.lineJoin='round';
    // Main crack lines — irregular lightning bolt pattern
    const mainCracks=[
      [[0,0],[cl*0.4,-cl*0.5],[cl*0.6,-cl*0.9]],
      [[0,0],[-cl*0.3,-cl*0.4],[-cl*0.5,-cl*0.85]],
      [[0,0],[cl*0.2,cl*0.5],[cl*0.1,cl*0.9]],
    ];
    mainCracks.forEach((pts,mi)=>{
      ctx.strokeStyle=`rgba(20,16,10,${0.55+mi*0.05})`; ctx.lineWidth=2*s;
      ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
      pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));
      ctx.stroke();
      // Secondary hairline off main crack
      const mid=pts[1];
      ctx.strokeStyle='rgba(18,14,9,0.35)'; ctx.lineWidth=1*s;
      ctx.beginPath(); ctx.moveTo(mid[0],mid[1]);
      ctx.lineTo(mid[0]+(rng2(o.wx+mi,90)-.5)*cl*0.8,
                 mid[1]+(rng2(o.wx+mi,91)-.5)*cl*0.8);
      ctx.stroke();
    });
    // Darker fill between cracks (lifted asphalt)
    ctx.fillStyle='rgba(15,12,8,0.3)';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(cl*0.4,-cl*0.5);
    ctx.lineTo(-cl*0.3,-cl*0.4);
    ctx.closePath(); ctx.fill();
    // Dust/debris dots
    ctx.fillStyle='rgba(55,48,35,0.4)';
    for(let d=0;d<5;d++){
      ctx.beginPath();
      ctx.arc((rng2(o.wx+d,92)-.5)*cl*1.2,
              (rng2(o.wx+d,93)-.5)*cl*1.2,
              1.5+rng2(o.wx+d,94)*2,0,Math.PI*2);
      ctx.fill();
    }

  }else if(o.type==='wreck'){
    if(carImgEl.complete && carImgEl.naturalWidth > 0){
      const imgW = 167*s, imgH = 127*s;
      ctx.save();
      ctx.rotate(o.variant===1 ? 0.06 : -0.04);
      ctx.filter = 'saturate(2.8) brightness(1.35) contrast(1.2)';
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.95;
      ctx.drawImage(carImgEl, -imgW/2, -imgH/2, imgW, imgH);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.filter = 'none';
      ctx.restore();
    }

  }else if(o.type==='lamppost'){
    // Fallen/broken lamppost
    ctx.strokeStyle='#3a3028'; ctx.lineWidth=4*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,10*s); ctx.lineTo(8*s,-20*s); ctx.stroke();
    // Broken lamp head on ground
    ctx.fillStyle='#2a2218';
    ctx.beginPath(); ctx.ellipse(8*s,-20*s,6*s,4*s,0.3,0,Math.PI*2); ctx.fill();
    // Occasional ember glow
    if(o.variant===1){
      const ga=0.2+0.15*Math.sin(animTick*0.05+o.wobble);
      ctx.fillStyle=`rgba(255,80,0,${ga})`;
      ctx.beginPath(); ctx.arc(8*s,-20*s,4*s,0,Math.PI*2); ctx.fill();
    }

  }else if(o.type==='crack'){
    ctx.strokeStyle=o.variant===2?'rgba(80,0,0,0.5)':'rgba(60,50,40,0.4)';
    ctx.lineWidth=2*s; ctx.lineCap='round';
    const len=14*s;
    for(let cr=0;cr<3;cr++){
      const ca=(cr/3)*Math.PI+o.wobble;
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(ca)*len,Math.sin(ca)*len);
      ctx.stroke();
    }

  }else if(o.type==='bush'){
    // Overgrown bush / shrub bursting through concrete
    const bColors=['#1a4a0e','#245818','#2e6a1a','#143808'];
    const darkCol='#0e2808';
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(3,6,18*s,8*s,0,0,Math.PI*2); ctx.fill();
    // Concrete crack underneath
    ctx.strokeStyle='rgba(60,50,40,0.5)'; ctx.lineWidth=1.5;
    for(let cr=0;cr<4;cr++){
      const ca=cr*Math.PI/2+o.wobble*0.3;
      ctx.beginPath(); ctx.moveTo(0,4);
      ctx.lineTo(Math.cos(ca)*16*s, 4+Math.sin(ca)*10*s); ctx.stroke();
    }
    // Main bush clumps
    const numClumps = 5+o.variant*2;
    for(let b=0;b<numClumps;b++){
      const bx=(rng2(o.wx+b,10)-.5)*22*s;
      const by=(rng2(o.wx+b,11)-.5)*14*s;
      const br=6*s+rng2(o.wx+b,12)*6*s;
      ctx.fillStyle=bColors[Math.floor(rng2(o.wx+b,13)*4)];
      ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
    }
    // Dark inner leaves
    for(let b=0;b<3;b++){
      const bx=(rng2(o.wx+b,20)-.5)*14*s;
      const by=(rng2(o.wx+b,21)-.5)*8*s;
      ctx.fillStyle=darkCol;
      ctx.beginPath(); ctx.arc(bx,by,3*s,0,Math.PI*2); ctx.fill();
    }
    // Occasional flower dot
    if(o.variant===1){
      ctx.fillStyle='#c8aa22';
      ctx.beginPath(); ctx.arc(-4*s,-5*s,2.5,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5*s,-3*s,2,0,Math.PI*2); ctx.fill();
    }

  }else if(o.type==='weed'){
    // Weeds/grass tufts pushing through asphalt
    const stemColors=['#1e4e12','#28601a','#163810'];
    const numStems=4+o.variant*2;
    // Crack in ground
    ctx.strokeStyle='rgba(50,42,32,0.5)'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(-8*s,2); ctx.lineTo(8*s,2); ctx.stroke();
    for(let w=0;w<numStems;w++){
      const wx=(rng2(o.wx+w,30)-.5)*14*s;
      const wh=(10+rng2(o.wx+w,31)*12)*s;
      const wLean=(rng2(o.wx+w,32)-.5)*0.6;
      ctx.strokeStyle=stemColors[w%3]; ctx.lineWidth=2*s; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(wx,2);
      ctx.quadraticCurveTo(wx+wLean*wh*0.5,-wh*0.5,wx+wLean*wh,-wh);
      ctx.stroke();
      // Leaf at tip
      ctx.fillStyle=stemColors[w%3];
      ctx.beginPath(); ctx.ellipse(wx+wLean*wh,-wh,3*s,5*s,wLean,0,Math.PI*2); ctx.fill();
    }
    // Small pebbles around base
    ctx.fillStyle='rgba(80,70,55,0.6)';
    for(let p=0;p<3;p++){
      ctx.beginPath(); ctx.arc((rng2(o.wx+p,40)-.5)*10*s,3,2,0,Math.PI*2); ctx.fill();
    }

  }else if(o.type==='vine'){
    // Ivy/vine creeping across ground, maybe up a wall fragment
    ctx.strokeStyle='rgba(20,50,10,0.75)'; ctx.lineWidth=2*s; ctx.lineCap='round';
    // Main vine stem
    const vLen=20*s;
    ctx.beginPath(); ctx.moveTo(-vLen,0);
    ctx.bezierCurveTo(-vLen*.5,-6*s, vLen*.4,4*s, vLen,2*s); ctx.stroke();
    // Side shoots
    for(let v=0;v<4;v++){
      const vx=-vLen+v*(vLen*0.6);
      const vy=(rng2(o.wx+v,50)-.5)*8*s;
      const vsx=(rng2(o.wx+v,51)-.5)*10*s;
      const vsy=-(5+rng2(o.wx+v,52)*8)*s;
      ctx.strokeStyle=`rgba(${18+v*3},${48+v*5},10,0.65)`;
      ctx.lineWidth=1.5*s;
      ctx.beginPath(); ctx.moveTo(vx,vy); ctx.lineTo(vx+vsx,vy+vsy); ctx.stroke();
      // Leaf
      ctx.fillStyle=`rgba(22,${55+v*6},12,0.8)`;
      ctx.beginPath(); ctx.ellipse(vx+vsx,vy+vsy,4*s,3*s,rng2(o.wx+v,53)*Math.PI,0,Math.PI*2); ctx.fill();
    }
  } // end vine

  if(o.type==='rock'){
    // Cluster of rocks / rubble stones
    const rBase = 10*s;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(3,rBase*0.8,rBase*1.4,rBase*0.45,0,0,Math.PI*2); ctx.fill();

    // Number of stones in cluster (2-4 based on variant)
    const numStones = 2 + o.variant;
    const stonePositions = [
      {x:0,       y:0,        r:rBase,      rot:o.wobble},
      {x:rBase*1.1,y:-rBase*0.3,r:rBase*0.78, rot:o.wobble+1.2},
      {x:-rBase*0.9,y:rBase*0.4,r:rBase*0.65, rot:o.wobble+2.1},
      {x:rBase*0.4, y:rBase*0.9,r:rBase*0.55, rot:o.wobble+0.7},
    ];

    stonePositions.slice(0, numStones).forEach((st, si) => {
      // Stone body
      const stoneG = ctx.createRadialGradient(
        st.x - st.r*0.3, st.y - st.r*0.3, st.r*0.05,
        st.x, st.y, st.r
      );
      const lightVal = 80 + si*8 + Math.floor(rng2(o.wx+si,40)*20);
      stoneG.addColorStop(0, `rgb(${lightVal+30},${lightVal+22},${lightVal+10})`);
      stoneG.addColorStop(0.5, `rgb(${lightVal},${lightVal-8},${lightVal-18})`);
      stoneG.addColorStop(1,   `rgb(${lightVal-20},${lightVal-28},${lightVal-38})`);
      ctx.fillStyle = stoneG;

      // Irregular polygon shape
      ctx.beginPath();
      const sides = 5 + Math.floor(rng2(o.wx+si,41)*3);
      for(let v=0;v<sides;v++){
        const va = v/sides*Math.PI*2 + st.rot;
        const vr = st.r*(0.7 + rng2(o.wx+si*7+v,42)*0.35);
        if(v===0) ctx.moveTo(st.x+Math.cos(va)*vr, st.y+Math.sin(va)*vr);
        else       ctx.lineTo(st.x+Math.cos(va)*vr, st.y+Math.sin(va)*vr);
      }
      ctx.closePath(); ctx.fill();

      // Dark edge stroke
      ctx.strokeStyle=`rgba(30,22,12,0.45)`; ctx.lineWidth=1;
      ctx.stroke();

      // Highlight on top-left
      ctx.fillStyle=`rgba(255,248,230,0.12)`;
      ctx.beginPath();
      ctx.ellipse(st.x-st.r*0.28, st.y-st.r*0.28, st.r*0.3, st.r*0.2, st.rot+0.5, 0, Math.PI*2);
      ctx.fill();

      // Crack line on larger stones
      if(si===0 && st.r > 8*s){
        ctx.strokeStyle=`rgba(20,14,6,0.4)`; ctx.lineWidth=0.8;
        ctx.beginPath();
        ctx.moveTo(st.x-st.r*0.2, st.y-st.r*0.3);
        ctx.lineTo(st.x+st.r*0.15, st.y+st.r*0.25);
        ctx.stroke();
      }
    });
  } // end rock

  if(o.type==='big_rock'){
    // Large boulder — solid obstacle
    const br = 20*s;

    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(5,br*0.7,br*1.3,br*0.4,0,0,Math.PI*2); ctx.fill();

    // Main boulder body
    const bigG = ctx.createRadialGradient(-br*0.3,-br*0.35,br*0.05, 0,0,br*1.1);
    bigG.addColorStop(0,  '#b8a888');
    bigG.addColorStop(0.3,'#908070');
    bigG.addColorStop(0.6,'#706050');
    bigG.addColorStop(1,  '#483828');
    ctx.fillStyle = bigG;

    // Irregular boulder shape
    ctx.beginPath();
    const bverts = [
      [-br*0.95, -br*0.25],
      [-br*0.6,  -br*0.92],
      [-br*0.05, -br*1.05],
      [ br*0.55, -br*0.88],
      [ br*1.0,  -br*0.3 ],
      [ br*0.95,  br*0.45],
      [ br*0.5,   br*0.85],
      [-br*0.15,  br*0.95],
      [-br*0.7,   br*0.65],
      [-br*1.0,   br*0.1 ],
    ];
    ctx.moveTo(bverts[0][0], bverts[0][1]);
    for(let v=1;v<bverts.length;v++) ctx.lineTo(bverts[v][0], bverts[v][1]);
    ctx.closePath(); ctx.fill();

    // Dark outline
    ctx.strokeStyle='rgba(28,18,8,0.5)'; ctx.lineWidth=1.5;
    ctx.stroke();

    // Surface detail — flat facets
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath();
    ctx.moveTo(-br*0.4, -br*0.5);
    ctx.lineTo( br*0.3, -br*0.6);
    ctx.lineTo( br*0.5,  br*0.1);
    ctx.lineTo(-br*0.1,  br*0.2);
    ctx.closePath(); ctx.fill();

    // Highlight — top-left lit
    ctx.fillStyle='rgba(255,248,220,0.14)';
    ctx.beginPath(); ctx.ellipse(-br*0.35,-br*0.42,br*0.38,br*0.22,0.4,0,Math.PI*2); ctx.fill();

    // Moss patches
    ctx.fillStyle='rgba(35,55,20,0.38)';
    ctx.beginPath(); ctx.ellipse(-br*0.2,br*0.4,br*0.28,br*0.16,0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(br*0.3,br*0.55,br*0.2,br*0.12,-0.3,0,Math.PI*2); ctx.fill();

    // Crack lines
    ctx.strokeStyle='rgba(22,14,6,0.4)'; ctx.lineWidth=1.2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-br*0.3,-br*0.3); ctx.lineTo(br*0.4,br*0.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(br*0.1,-br*0.5); ctx.lineTo(br*0.6,br*0.1); ctx.stroke();

    // Small pebbles around base
    ctx.fillStyle='rgba(80,65,45,0.55)';
    for(let p=0;p<5;p++){
      const pa=p/5*Math.PI*2+o.wobble;
      const pd=br*(1.1+rng2(o.wx+p,90)*0.3);
      ctx.beginPath(); ctx.arc(Math.cos(pa)*pd,Math.sin(pa)*pd,(2+rng2(o.wx+p,91)*2)*s,0,Math.PI*2); ctx.fill();
    }
  } // end big_rock

  if(o.type==='sprout'){
    // Small greenery — grass tuft / tiny plant sprouting through asphalt
    const numBlades = 3 + o.variant;
    // Tiny crack in ground
    ctx.strokeStyle='rgba(40,32,20,0.35)'; ctx.lineWidth=1; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-4*s,2*s); ctx.lineTo(4*s,2*s); ctx.stroke();

    for(let b=0;b<numBlades;b++){
      const bx = (rng2(o.wx+b,95)-.5)*8*s;
      const bh = (6+rng2(o.wx+b,96)*8)*s;
      const blean = (rng2(o.wx+b,97)-.5)*0.7;
      // Stem
      const g=`rgba(${26+Math.floor(rng2(o.wx+b,98)*12)},${52+Math.floor(rng2(o.wx+b,99)*20)},${14+Math.floor(rng2(o.wx+b,100)*8)},0.88)`;
      ctx.strokeStyle=g; ctx.lineWidth=(1.2+rng2(o.wx+b,101)*0.8)*s;
      ctx.beginPath();
      ctx.moveTo(bx, 2*s);
      ctx.quadraticCurveTo(bx+blean*bh*0.4, 2*s-bh*0.5, bx+blean*bh, 2*s-bh);
      ctx.stroke();
      // Tiny leaf tip
      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.ellipse(bx+blean*bh, 2*s-bh, (1.8+rng2(o.wx+b,102)*1.5)*s, (1.2+rng2(o.wx+b,103))*s, blean, 0, Math.PI*2);
      ctx.fill();
    }
    // Optional tiny flower
    if(o.variant===2){
      ctx.fillStyle='rgba(220,200,80,0.75)';
      ctx.beginPath(); ctx.arc(0,-8*s,2*s,0,Math.PI*2); ctx.fill();
    }
  } // end sprout

  if(o.type==='fire'){
    // Animated campfire / burning debris — same size as big rock
    const fr = 18*s;
    const t = animTick;

    // Charred ground circle
    ctx.fillStyle='rgba(15,10,5,0.55)';
    ctx.beginPath(); ctx.ellipse(0, fr*0.65, fr*1.1, fr*0.38, 0, 0, Math.PI*2); ctx.fill();

    // Logs / debris at base
    ctx.fillStyle='#2a1a08';
    ctx.save(); ctx.rotate(0.4);
    ctx.beginPath(); ctx.roundRect(-fr*0.8, fr*0.3, fr*1.4, fr*0.22, fr*0.1); ctx.fill();
    ctx.restore();
    ctx.save(); ctx.rotate(-0.5);
    ctx.beginPath(); ctx.roundRect(-fr*0.7, fr*0.25, fr*1.2, fr*0.2, fr*0.1); ctx.fill();
    ctx.restore();
    // Ember glow on logs
    ctx.fillStyle='rgba(200,80,0,0.5)';
    ctx.beginPath(); ctx.ellipse(-fr*0.1, fr*0.42, fr*0.35, fr*0.12, 0.3, 0, Math.PI*2); ctx.fill();

    // ── FIRE LAYERS (back to front, larger to smaller) ──
    // Layer 1 — outer orange glow
    function flame(cx2, cy2, w, h, phase, color, alpha){
      const flicker = Math.sin(t*0.18+phase)*0.15;
      const flicker2 = Math.cos(t*0.13+phase*1.3)*0.1;
      ctx.fillStyle = color;
      ctx.globalAlpha = alpha * (0.7 + Math.abs(Math.sin(t*0.12+phase))*0.3);
      ctx.beginPath();
      ctx.moveTo(cx2, cy2);
      ctx.bezierCurveTo(
        cx2-w*(0.5+flicker), cy2-h*0.4,
        cx2-w*(0.3+flicker2), cy2-h*0.85,
        cx2, cy2-h*(0.9+flicker)
      );
      ctx.bezierCurveTo(
        cx2+w*(0.3-flicker2), cy2-h*0.85,
        cx2+w*(0.5-flicker), cy2-h*0.4,
        cx2, cy2
      );
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Outer red-orange
    flame(0, fr*0.35, fr*0.85, fr*1.5, o.wobble,     '#cc3300', 0.75);
    // Mid orange
    flame(-fr*0.15, fr*0.3, fr*0.65, fr*1.25, o.wobble+1.2, '#ee6600', 0.8);
    flame( fr*0.18, fr*0.32, fr*0.55, fr*1.1,  o.wobble+2.1, '#ff5500', 0.7);
    // Inner yellow-orange
    flame(0, fr*0.28, fr*0.45, fr*1.0, o.wobble+0.6, '#ff9900', 0.85);
    // Core yellow-white
    flame( fr*0.05, fr*0.25, fr*0.28, fr*0.75, o.wobble+1.8, '#ffdd44', 0.8);
    flame(-fr*0.05, fr*0.22, fr*0.18, fr*0.55, o.wobble+3.0, '#ffffaa', 0.6);

    // ── SPARKS ──
    ctx.fillStyle='rgba(255,200,50,0.85)';
    for(let sp=0;sp<6;sp++){
      const sa = t*0.07 + sp*1.05 + o.wobble;
      const sr = fr*(0.3+Math.abs(Math.sin(t*0.05+sp*0.8))*0.6);
      const sy = fr*(0.3-Math.abs(Math.sin(t*0.08+sp))*1.1);
      ctx.beginPath();
      ctx.arc(Math.cos(sa)*sr*0.4, sy, (0.8+rng2(o.wx+sp,110)*1.2)*s, 0, Math.PI*2);
      ctx.fill();
    }

    // ── SMOKE ──
    for(let sm=0;sm<3;sm++){
      const smT = (t*0.008 + sm*0.33 + o.wobble) % 1;
      const smX = Math.sin(t*0.04+sm*2.1)*fr*0.3;
      const smY = -fr*(0.8 + smT*1.4);
      const smR = fr*(0.15 + smT*0.5);
      ctx.fillStyle=`rgba(60,52,42,${0.18*(1-smT)})`;
      ctx.beginPath(); ctx.arc(smX, smY, smR, 0, Math.PI*2); ctx.fill();
    }
  } // end fire

  ctx.restore();
}

// DRAW PLAYER
// ============================================================
function drawPlayer(){
  const cx  = player.x + player.w / 2;
  const top = player.y - 14; // head moved up more for natural neck
  const headR = 22;
  const headCY = top + headR;

  ctx.save();

  // Death fall
  if (playerDead) {
    const pivX = cx, pivY = top + player.h;
    ctx.translate(pivX, pivY);
    ctx.rotate(Math.min(Math.PI / 2, playerDieRot));
    ctx.translate(-pivX, -pivY);
  }

  // ── LEGS ──
  ctx.fillStyle = '#3a3028';
  ctx.beginPath(); ctx.roundRect(cx-14, top+56, 13, 20, 4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(cx+1,  top+56, 13, 20, 4); ctx.fill();
  ctx.fillStyle = '#1a1208';
  ctx.beginPath(); ctx.roundRect(cx-16, top+74, 15, 8, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(cx+1,  top+74, 15, 8, 3); ctx.fill();

  // ── BELT ──
  ctx.fillStyle = '#2a1a08';
  ctx.fillRect(cx-18, top+54, 36, 5);
  ctx.fillStyle = '#c8a020';
  ctx.fillRect(cx-5, top+54, 10, 5);

  // ── TORSO — muscular, blue T-shirt ──
  const torsoGrad = ctx.createLinearGradient(cx-20, top+28, cx+20, top+54);
  torsoGrad.addColorStop(0, '#d4956a');
  torsoGrad.addColorStop(0.4, '#c07848');
  torsoGrad.addColorStop(1, '#a05828');
  ctx.fillStyle = torsoGrad;
  ctx.beginPath(); ctx.roundRect(cx-20, top+28, 40, 28, 5); ctx.fill();

  // Blue T-shirt over torso
  const shirtGrad = ctx.createLinearGradient(cx-18, top+28, cx+18, top+54);
  shirtGrad.addColorStop(0, '#3a6aaa');
  shirtGrad.addColorStop(0.5, '#2a5898');
  shirtGrad.addColorStop(1, '#1a3a78');
  ctx.fillStyle = shirtGrad;
  ctx.beginPath();
  ctx.moveTo(cx-18, top+28);
  ctx.lineTo(cx+18, top+28);
  ctx.lineTo(cx+18, top+54);
  ctx.lineTo(cx+14, top+56);
  ctx.lineTo(cx-14, top+56);
  ctx.lineTo(cx-18, top+54);
  ctx.closePath(); ctx.fill();
  // T-shirt sleeves (short)
  ctx.fillStyle = '#2a5898';
  ctx.beginPath(); ctx.roundRect(cx-26, top+28, 10, 12, 4); ctx.fill(); // left sleeve
  ctx.beginPath(); ctx.roundRect(cx+16, top+28, 10, 12, 4); ctx.fill(); // right sleeve
  // Chest crease
  ctx.strokeStyle = 'rgba(20,40,80,0.35)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx, top+30); ctx.lineTo(cx, top+52); ctx.stroke();

  // ── LEFT ARM — bare muscle, relaxed ──
  const skinG = ctx.createLinearGradient(cx-34, top+38, cx-16, top+56);
  skinG.addColorStop(0, '#c87848'); skinG.addColorStop(1, '#a05830');
  ctx.fillStyle = skinG;
  ctx.beginPath(); ctx.roundRect(cx-34, top+38, 15, 20, 6); ctx.fill();
  ctx.fillStyle = '#d4885a';
  ctx.beginPath(); ctx.ellipse(cx-28, top+43, 7, 5, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c07848';
  ctx.beginPath(); ctx.roundRect(cx-36, top+56, 12, 10, 4); ctx.fill();

  // ── RIGHT ARM — raised UPWARD holding gun ──
  const rArmG = ctx.createLinearGradient(cx+16, top+10, cx+32, top+36);
  rArmG.addColorStop(0, '#c87848'); rArmG.addColorStop(1, '#a05830');
  ctx.fillStyle = rArmG;
  // Upper arm going up
  ctx.beginPath(); ctx.roundRect(cx+18, top+10, 14, 26, 6); ctx.fill();
  // Bicep
  ctx.fillStyle = '#d4885a';
  ctx.beginPath(); ctx.ellipse(cx+24, top+20, 6, 8, 0, 0, Math.PI*2); ctx.fill();
  // Forearm pointing up
  ctx.fillStyle = '#b86838';
  ctx.beginPath(); ctx.roundRect(cx+20, top+2, 10, 14, 4); ctx.fill();
  // Fist at top
  ctx.fillStyle = '#c07848';
  ctx.beginPath(); ctx.roundRect(cx+18, top-4, 14, 10, 4); ctx.fill();

  // ── GUN — pointing UPWARD in right hand ──
  ctx.fillStyle = '#222222';
  ctx.shadowColor = '#44ff00'; ctx.shadowBlur = 8;
  // Gun body (vertical)
  ctx.beginPath(); ctx.roundRect(cx+22, top-14, 8, 18, 3); ctx.fill();
  // Barrel pointing up
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.roundRect(cx+24, top-26, 5, 14, 2); ctx.fill();
  // Muzzle
  ctx.fillStyle = '#00cc44';
  ctx.beginPath(); ctx.arc(cx+26, top-27, 3, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Grip
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.roundRect(cx+22, top+2, 6, 10, 2); ctx.fill();

  // ── NECK — tall and visible ──
  ctx.fillStyle = '#b86838';
  ctx.beginPath(); ctx.roundRect(cx-6, top+22, 12, 14, 3); ctx.fill();
  // Neck shadow for depth
  ctx.fillStyle = 'rgba(80,40,10,0.3)';
  ctx.beginPath(); ctx.roundRect(cx+2, top+22, 4, 14, 2); ctx.fill();

  // ── HEAD — face photo ──
  if (faceImgEl.complete && faceImgEl.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, headCY, headR, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(faceImgEl, cx-headR, headCY-headR, headR*2, headR*2);
    ctx.restore();
    ctx.strokeStyle = '#44cc00'; ctx.lineWidth = 2.5;
    ctx.shadowColor = '#66ff00'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(cx, headCY, headR, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = '#c07848';
    ctx.beginPath(); ctx.arc(cx, headCY, headR, 0, Math.PI*2); ctx.fill();
  }

  // Hit flash
  if (player._hitFlash > 0) {
    player._hitFlash--;
    ctx.fillStyle = `rgba(255,0,0,${0.35 * player._hitFlash/20})`;
    ctx.beginPath(); ctx.roundRect(cx-36, top+0, 80, 80, 5); ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}


function spawnExplosion(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      life:1, decay:Math.random()*0.04+0.02, r:Math.random()*3+1, color });
  }
  explosions.push({x, y, r:4, maxR:28, color, life:1});
}

function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function render() {
  // Ground: cracked asphalt
  const aspGrad = ctx.createLinearGradient(0,0,W,H);
  aspGrad.addColorStop(0,'#3a3228'); aspGrad.addColorStop(0.5,'#42382e'); aspGrad.addColorStop(1,'#38302a');
  ctx.fillStyle = aspGrad; ctx.fillRect(0,0,W,H);

  // Scrolling road markings
  const lineOff = ((camY*0.5)%80+80)%80;
  ctx.strokeStyle='rgba(140,110,60,0.35)'; ctx.lineWidth=2; ctx.setLineDash([30,50]);
  ctx.beginPath(); ctx.moveTo(W/3, lineOff-80); ctx.lineTo(W/3, H+80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*2/3, lineOff-80); ctx.lineTo(W*2/3, H+80); ctx.stroke();
  ctx.setLineDash([]);

  // Scene objects
  const visObjs = SCENE_OBJS.map(o => {
    const sx = (o.wx % W + W) % W;
    const sy = ((o.wy - camY) % OBJ_REPEAT + OBJ_REPEAT) % OBJ_REPEAT - 100;
    return {...o, sx, sy};
  }).filter(o => o.sy > -120 && o.sy < H+80).sort((a,b) => a.sy - b.sy);
  visObjs.forEach(o => drawSceneObj(o, o.sx, o.sy));

  // Enemy bullets (zombie projectiles)
  enemyBullets.forEach(b => {
    ctx.fillStyle = '#cc2200';
    ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(b.sx, b.sy, 5, 0, Math.PI*2); ctx.fill();
    // Inner bright core
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.arc(b.sx, b.sy, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Player bullets
  player.bullets.forEach(b => {
    ctx.fillStyle='#ffee22'; ctx.shadowColor='#ff8800'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(b.sx, b.sy, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  });

  // Zombie
  zombie.draw(ctx);

  // Player
  drawPlayer();

  // Particles
  particles.forEach(p => {
    ctx.fillStyle=p.color; ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  explosions.forEach(ex => {
    ctx.strokeStyle=ex.color; ctx.globalAlpha=ex.life; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2); ctx.stroke();
  });
  ctx.globalAlpha=1;

  // Vignette
  const vig = ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.28)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // ── INTRO SCREEN ──
  if (introActive) {
    introBlink++;
    // Dark overlay
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(0,0,W,H);

    // Green transparent panel — 90s style
    const pw=W*0.96, ph=H*0.88;
    const px2=(W-pw)/2, py2=(H-ph)/2;
    // Panel background
    ctx.fillStyle='rgba(0,40,0,0.82)';
    ctx.beginPath(); ctx.roundRect(px2,py2,pw,ph,6); ctx.fill();
    // Green border — double line 90s style
    ctx.strokeStyle='#00ff44'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(px2,py2,pw,ph,6); ctx.stroke();
    ctx.strokeStyle='rgba(0,255,68,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(px2+5,py2+5,pw-10,ph-10,4); ctx.stroke();

    // Scanline effect (horizontal lines)
    ctx.fillStyle='rgba(0,0,0,0.08)';
    for(let sl=py2;sl<py2+ph;sl+=4){
      ctx.fillRect(px2,sl,pw,2);
    }

    const cx2=W/2;
    ctx.textAlign='center';

    // Title
    ctx.font=`bold ${Math.floor(W*0.09)}px 'Bebas Neue',sans-serif`;
    ctx.fillStyle='#00ff44';
    ctx.shadowColor='#00ff44'; ctx.shadowBlur=18;
    ctx.fillText('☣ PRAGUE ZOOMBIES ☣', cx2, py2+52);
    ctx.shadowBlur=0;

    // Divider
    ctx.strokeStyle='rgba(0,255,68,0.5)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(px2+20,py2+62); ctx.lineTo(px2+pw-20,py2+62); ctx.stroke();
    ctx.setLineDash([]);

    // Story — dynamically centred between title and divider2
    const storyLines=[
      'Je rok 2027. Zombie apokalypsa zachvátila Prahu.',
      'Jsi jediný přeživší v ulicích kdysi',
      'krásného města. Zombíci jsou všude.',
      'Bojuj, přežij a uraz co největší vzdálenost.',
      'Praha potřebuje hrdinu — a tím jsi TY.',
    ];
    const storyFontSize = Math.floor(Math.min(W*0.038, (ph*0.52 - 30) / storyLines.length / 1.4));
    const storyLineH = storyFontSize * 1.45;
    const storyBlockH = storyLines.length * storyLineH;
    const storyTop = py2 + 75;        // below title+divider
    const storyBot = py2 + ph * 0.56; // above divider2
    const storyY = storyTop + (storyBot - storyTop - storyBlockH) / 2 + storyFontSize;
    ctx.font=`${storyFontSize}px 'Share Tech Mono',monospace`;
    ctx.fillStyle='#88ffaa';
    ctx.shadowColor='#00cc44'; ctx.shadowBlur=4;
    storyLines.forEach((line,i)=>{
      ctx.fillText(line, cx2, storyY + i*storyLineH);
    });
    ctx.shadowBlur=0;

    // Divider 2
    ctx.strokeStyle='rgba(0,255,68,0.4)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(px2+20,py2+ph*0.58); ctx.lineTo(px2+pw-20,py2+ph*0.58); ctx.stroke();
    ctx.setLineDash([]);

    // Controls title
    ctx.font=`bold ${Math.floor(W*0.038)}px 'Bebas Neue',sans-serif`;
    ctx.fillStyle='#00ff44';
    ctx.fillText('— OVLÁDÁNÍ —', cx2, py2+ph*0.63);

    // Controls — draw keyboard-style buttons
    const keySize = Math.floor(W*0.055);
    const keyFont = Math.floor(keySize*0.55);
    const ctrlY0 = py2+ph*0.68;
    const ctrlLineH = keySize*2.6; // more space between rows
    ctx.shadowBlur=0;

    function drawKey(label, kx, ky, kw) {
      const kh = keySize;
      // Key shadow (3D effect)
      ctx.fillStyle='rgba(0,80,0,0.8)';
      ctx.beginPath(); ctx.roundRect(kx+2,ky+3,kw,kh,4); ctx.fill();
      // Key body
      ctx.fillStyle='rgba(0,30,0,0.9)';
      ctx.beginPath(); ctx.roundRect(kx,ky,kw,kh,4); ctx.fill();
      // Key border
      ctx.strokeStyle='#00ff44'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.roundRect(kx,ky,kw,kh,4); ctx.stroke();
      // Key top highlight
      ctx.fillStyle='rgba(0,255,68,0.08)';
      ctx.beginPath(); ctx.roundRect(kx+2,ky+2,kw-4,kh*0.4,3); ctx.fill();
      // Label
      ctx.fillStyle='#00ff44';
      ctx.font=`bold ${keyFont}px 'Share Tech Mono',monospace`;
      ctx.textAlign='center';
      ctx.fillText(label, kx+kw/2, ky+kh*0.68);
    }

    const isMobIntro = /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && window.innerWidth < 900);

    if (!isMobIntro) {
      // ── DESKTOP: keyboard keys ──
      const arrowW = keySize*1.1;
      const arrowGap = keySize*0.22;
      const arrowsTotal = arrowW*4 + arrowGap*3;
      const arrowsX = cx2 - arrowsTotal/2;
      drawKey('↑', arrowsX,                       ctrlY0, arrowW);
      drawKey('↓', arrowsX+arrowW+arrowGap,       ctrlY0, arrowW);
      drawKey('←', arrowsX+(arrowW+arrowGap)*2,   ctrlY0, arrowW);
      drawKey('→', arrowsX+(arrowW+arrowGap)*3,   ctrlY0, arrowW);
      ctx.font=`${Math.floor(W*0.03)}px 'Share Tech Mono',monospace`;
      ctx.fillStyle='#aaffcc'; ctx.textAlign='center';
      ctx.fillText('Pohyb postavy', cx2, ctrlY0+keySize+30);

      const spaceW = keySize*3.5;
      const spaceX = cx2 - spaceW/2;
      drawKey('MEZERNÍK', spaceX, ctrlY0+ctrlLineH, spaceW);
      ctx.font=`${Math.floor(W*0.03)}px 'Share Tech Mono',monospace`;
      ctx.fillStyle='#aaffcc'; ctx.textAlign='center';
      ctx.fillText('Střelba', cx2, ctrlY0+ctrlLineH+keySize+30);

    } else {
      // ── MOBILE: joystick + fire button ──
      const iconSize = keySize * 1.4;
      const iconGap  = keySize * 1.2;
      const iconY    = ctrlY0;

      // Draw joystick icon
      function drawJoyIcon(jx, jy, r) {
        // Base circle
        ctx.strokeStyle='#00ff44'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(jx, jy, r, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle='rgba(0,40,0,0.7)';
        ctx.beginPath(); ctx.arc(jx, jy, r, 0, Math.PI*2); ctx.fill();
        // Knob
        const kg=ctx.createRadialGradient(jx-r*0.15,jy-r*0.15,r*0.05,jx,jy,r*0.38);
        kg.addColorStop(0,'#44ff88'); kg.addColorStop(1,'#00aa44');
        ctx.fillStyle=kg;
        ctx.beginPath(); ctx.arc(jx, jy, r*0.38, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle='#00ff44'; ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(jx, jy, r*0.38, 0, Math.PI*2); ctx.stroke();
      }

      // Draw fire button icon
      function drawFireIcon(fx, fy, r) {
        ctx.strokeStyle='#00ff44'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle='rgba(0,40,0,0.7)';
        ctx.beginPath(); ctx.arc(fx, fy, r, 0, Math.PI*2); ctx.fill();
        // Fire emoji / explosion
        ctx.font=`bold ${Math.floor(r*1.1)}px serif`;
        ctx.fillStyle='#00ff44'; ctx.textAlign='center';
        ctx.fillText('💥', fx, fy+r*0.35);
      }

      const r = iconSize * 0.5;
      const jx = cx2 - iconGap - r;
      const fx = cx2 + iconGap + r;

      drawJoyIcon(jx, iconY + r, r);
      drawFireIcon(fx, iconY + r, r);

      ctx.font=`${Math.floor(W*0.03)}px 'Share Tech Mono',monospace`;
      ctx.fillStyle='#aaffcc'; ctx.textAlign='center';
      ctx.fillText('Pohyb', jx, iconY + iconSize + 18);
      ctx.fillText('Střelba', fx, iconY + iconSize + 18);

      // Second row label
      ctx.font=`${Math.floor(W*0.028)}px 'Share Tech Mono',monospace`;
      ctx.fillStyle='rgba(150,255,180,0.7)';
      ctx.fillText('Virtuální joystick  +  tlačítko FIRE', cx2, iconY + iconSize + 42);
    }

    // Blinking PRESS SPACE
    if(Math.floor(introBlink/30)%2===0){
      ctx.font=`bold ${Math.floor(W*0.062)}px 'Bebas Neue',sans-serif`;
      ctx.fillStyle='#ff2200';
      ctx.shadowColor='#ff0000'; ctx.shadowBlur=18;
      ctx.fillText(isMobIntro ? '[ ZAČÁTEK HRY - STISKNI FIRE ]' : '[ ZAČÁTEK HRY - STISKNI MEZERNÍK ]', cx2, py2+ph-22);
      ctx.shadowBlur=0;
    }

    ctx.textAlign='left';
  }

  // GAME OVER overlay
  if (gameOverActive) {
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
    const goGlow=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.5);
    goGlow.addColorStop(0,'rgba(120,0,0,0.35)'); goGlow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=goGlow; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.font="bold "+Math.floor(W*0.13)+"px 'Bebas Neue',sans-serif";
    ctx.fillStyle='#cc0000'; ctx.shadowColor='#ff2200'; ctx.shadowBlur=30;
    ctx.fillText('GAME OVER', W/2, H/2-30); ctx.shadowBlur=0;
    ctx.font="bold "+Math.floor(W*0.055)+"px 'Share Tech Mono',monospace";
    ctx.fillStyle='#dddddd'; ctx.shadowBlur=8; ctx.shadowColor='#888';
    ctx.fillText('Vzdálenost: '+distAtDeath+' m', W/2, H/2+30); ctx.shadowBlur=0;
    ctx.font=Math.floor(W*0.03)+"px 'Share Tech Mono',monospace";
    ctx.fillStyle='rgba(180,180,180,0.7)';
    ctx.fillText('— stiskni FIRE pro restart —', W/2, H/2+75);
    ctx.textAlign='left';
  }
}

function restartGame() {
  gameOverActive=false; playerDead=false; playerDieRot=0; playerDieTimer=0; playerHits=0;
  distAtDeath=0; score=0; camY=0; killCount=0; enemyBullets=[]; zombieShootTimer=0;
  player.x=W/2-player.w/2; player.y=H-player.h-40; player.bullets=[];
  resetZombie();
}

function gameLoop() { update(); render(); requestAnimationFrame(gameLoop); }

// After DOM renders, shrink canvas if it overflows viewport
window.addEventListener('load', () => {
  function fitCanvas() {
    const isMob = /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 1 && window.innerWidth < 600);
    if (isMob) {
      // Mobile: full width, use CSS flex to fill remaining height
      canvas.style.width   = '100vw';
      canvas.style.height  = '100%';
      canvas.style.flex    = '1 1 0';
      canvas.style.display = 'block';
      canvas.style.margin  = '0';
      canvas.style.padding = '0';
    } else {
      // Desktop/tablet: constrain height
      const vph = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const topbar = document.getElementById('topbar');
      const topH = topbar ? topbar.offsetHeight + 2 : 36;
      const maxH = Math.floor(vph - topH);
      if (canvas.height > maxH) {
        canvas.style.height = maxH + 'px';
        canvas.style.width  = 'auto';
      }
      canvas.style.display = 'block';
    }
  }
  fitCanvas();
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fitCanvas);
  }
  window.addEventListener('resize', fitCanvas);
});

gameLoop();
</script>
</body>
